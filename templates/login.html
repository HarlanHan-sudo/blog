<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>博客后台 - 登录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        .login-box h2 { color: #333; margin-bottom: 30px; font-weight: 600; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-size: 0.9em; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px;
            outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #667eea; box-shadow: 0 0 8px rgba(102,126,234,0.3); }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(118,75,162,0.4); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>系统登录</h2>
        <form method="post" action="/login">
            <div class="input-group">
                <label>用户名 (默认: admin)</label>
                <input type="text" name="username" required>
            </div>
            <div class="input-group">
                <label>密码 (默认: admin123)</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">登 录</button>
        </form>
    </div>
</body>
</html>
